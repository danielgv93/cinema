<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Cinema Chorizox</title>
        <link
            rel="icon"
            type="image/svg+xml"
            href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23e8c547' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect x='2' y='2' width='20' height='20' rx='2.18' ry='2.18'/%3E%3Cline x1='7' y1='2' x2='7' y2='22'/%3E%3Cline x1='17' y1='2' x2='17' y2='22'/%3E%3Cline x1='2' y1='12' x2='22' y2='12'/%3E%3Cline x1='2' y1='7' x2='7' y2='7'/%3E%3Cline x1='2' y1='17' x2='7' y2='17'/%3E%3Cline x1='17' y1='17' x2='22' y2='17'/%3E%3Cline x1='17' y1='7' x2='22' y2='7'/%3E%3C/svg%3E"
        />

        <!-- Open Graph / Facebook -->
        <meta property="og:type" content="website" />
        <meta property="og:title" content="Cinema Chorizox" />
        <meta property="og:description" content="Cinema Chorizox" />
        <meta
            property="og:image"
            content="https://cinema.dgv93.eu/preview.jpg"
        />

        <!-- Twitter -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Cinema Chorizox" />
        <meta name="twitter:description" content="Cinema Chorizox" />
        <meta
            name="twitter:image"
            content="https://cinema.dgv93.eu/preview.jpg"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg-primary: #0a0a0c;
                --bg-card: #121215;
                --bg-card-hover: #18181c;
                --surface: #1c1c22;
                --border: #2a2a32;
                --text-primary: #eeeef0;
                --text-secondary: #8888a0;
                --text-muted: #55556a;
                --accent: #e8c547;
                --accent-dim: #c4a535;
                --accent-glow: rgba(232, 197, 71, 0.12);
                --red: #e54d4d;
                --green: #4dcc7a;
                --blue: #5b8dee;
                --radius: 10px;
                --radius-sm: 6px;
                --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: "DM Sans", sans-serif;
                background: var(--bg-primary);
                color: var(--text-primary);
                min-height: 100vh;
                overflow-x: hidden;
            }

            /* ─── GRAIN OVERLAY ─── */
            body::before {
                content: "";
                position: fixed;
                inset: 0;
                background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
                pointer-events: none;
                z-index: 9999;
            }

            /* ─── HEADER ─── */
            .header {
                position: relative;
                padding: 2.5rem 1.25rem 2rem;
                text-align: center;
                border-bottom: 1px solid var(--border);
                overflow: hidden;
            }

            .header::before {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: url('preview.jpg') center/cover no-repeat;
                opacity: 0.25;
                pointer-events: none;
            }

            .header-logo, .header-subtitle {
                position: relative;
                z-index: 1;
            }

            .header-logo {
                display: inline-flex;
                align-items: center;
                gap: 0.6rem;
                margin-bottom: 0.5rem;
            }

            .header-logo svg {
                width: 28px;
                height: 28px;
                color: var(--accent);
            }

            .header h1 {
                font-family: "Bebas Neue", sans-serif;
                font-size: 2.6rem;
                letter-spacing: 0.08em;
                color: var(--text-primary);
                line-height: 1;
                position: relative;
                z-index: 1;
                text-shadow: 0 2px 8px rgba(0, 0, 0, 0.7);
            }

            .header h1 span {
                color: var(--accent);
            }

            .header-subtitle {
                font-size: 0.82rem;
                color: var(--text-muted);
                letter-spacing: 0.2em;
                text-transform: uppercase;
                margin-top: 0.35rem;
            }

            /* ─── STATS BAR ─── */
            .stats-bar {
                display: flex;
                justify-content: center;
                gap: 2rem;
                padding: 1.2rem 1rem;
                border-bottom: 1px solid var(--border);
                background: var(--bg-card);
            }

            .stat {
                text-align: center;
            }

            .stat-value {
                font-family: "Bebas Neue", sans-serif;
                font-size: 1.6rem;
                color: var(--accent);
                line-height: 1.1;
            }

            .stat-label {
                font-size: 0.65rem;
                text-transform: uppercase;
                letter-spacing: 0.15em;
                color: var(--text-muted);
                margin-top: 0.1rem;
            }

            /* ─── SORT / FILTER ─── */
            .controls {
                display: flex;
                gap: 0.5rem;
                padding: 1rem 1.25rem;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
            }
            .controls::-webkit-scrollbar {
                display: none;
            }

            .control-btn {
                flex-shrink: 0;
                padding: 0.45rem 0.9rem;
                font-family: "DM Sans", sans-serif;
                font-size: 0.75rem;
                font-weight: 500;
                color: var(--text-secondary);
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 100px;
                cursor: pointer;
                transition: all 0.2s;
                white-space: nowrap;
            }

            .control-btn:hover {
                color: var(--text-primary);
                border-color: var(--text-muted);
            }

            .control-btn.active {
                color: var(--bg-primary);
                background: var(--accent);
                border-color: var(--accent);
            }

            /* ─── MOVIE GRID ─── */
            .movie-grid {
                display: grid;
                grid-template-columns: 1fr;
                gap: 1px;
                background: var(--border);
                margin: 0;
            }

            /* ─── MOVIE CARD ─── */
            .movie-card {
                display: grid;
                grid-template-columns: 100px 1fr;
                gap: 1rem;
                padding: 1.25rem;
                background: var(--bg-card);
                cursor: pointer;
                transition: background 0.25s;
                animation: fadeUp 0.5s ease both;
            }

            .movie-card:hover {
                background: var(--bg-card-hover);
            }

            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(16px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .movie-poster {
                position: relative;
                width: 100px;
                aspect-ratio: 2/3;
                border-radius: var(--radius-sm);
                overflow: hidden;
                box-shadow: 0 2px 16px rgba(0, 0, 0, 0.5);
            }

            .movie-poster img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
            }

            .movie-poster .rank-badge {
                position: absolute;
                top: 6px;
                left: 6px;
                width: 24px;
                height: 24px;
                background: rgba(0, 0, 0, 0.75);
                backdrop-filter: blur(8px);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: "Bebas Neue", sans-serif;
                font-size: 0.8rem;
                color: var(--accent);
                border: 1px solid rgba(232, 197, 71, 0.3);
            }

            .movie-info {
                display: flex;
                flex-direction: column;
                justify-content: center;
                min-width: 0;
            }

            .movie-title {
                font-family: "Bebas Neue", sans-serif;
                font-size: 1.3rem;
                letter-spacing: 0.03em;
                line-height: 1.15;
                color: var(--text-primary);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .movie-meta {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                margin-top: 0.2rem;
                font-size: 0.75rem;
                color: var(--text-muted);
            }

            .movie-meta .dot {
                width: 3px;
                height: 3px;
                border-radius: 50%;
                background: var(--text-muted);
                flex-shrink: 0;
            }

            .movie-genres {
                display: flex;
                gap: 0.35rem;
                margin-top: 0.6rem;
                flex-wrap: wrap;
            }

            .genre-tag {
                padding: 0.2rem 0.55rem;
                font-size: 0.62rem;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                color: var(--text-secondary);
                border: 1px solid var(--border);
                border-radius: 100px;
            }

            .movie-score-row {
                display: flex;
                align-items: center;
                gap: 0.6rem;
                margin-top: 0.7rem;
            }

            .avg-score {
                font-family: "Bebas Neue", sans-serif;
                font-size: 1.7rem;
                line-height: 1;
            }

            .score-bar-track {
                flex: 1;
                height: 4px;
                background: var(--surface);
                border-radius: 4px;
                overflow: hidden;
            }

            .score-bar-fill {
                height: 100%;
                border-radius: 4px;
                transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
            }

            .score-voters {
                font-size: 0.68rem;
                color: var(--text-muted);
                white-space: nowrap;
            }

            /* ─── EXPANDED DETAIL ─── */
            .movie-detail {
                display: none;
                grid-column: 1 / -1;
                overflow: hidden;
                background: var(--bg-card);
            }

            .movie-detail.open {
                display: block;
                max-height: 0;
                padding: 0 1.25rem;
                animation: detailDeploy 0.5s ease forwards;
            }

            .movie-detail.closing {
                display: block;
                max-height: 600px;
                padding: 0 1.25rem 1.25rem;
                animation: detailCollapse 0.3s ease forwards;
            }

            @keyframes detailDeploy {
                from {
                    max-height: 0;
                    padding: 0 1.25rem;
                }
                to {
                    max-height: 600px;
                    padding: 0 1.25rem 1.25rem;
                }
            }

            @keyframes detailCollapse {
                from {
                    max-height: 600px;
                    padding: 0 1.25rem 1.25rem;
                }
                to {
                    max-height: 0;
                    padding: 0 1.25rem;
                }
            }

            .detail-inner {
                padding-top: 0.75rem;
                border-top: 1px solid var(--border);
            }

            .detail-section-label {
                font-size: 0.62rem;
                text-transform: uppercase;
                letter-spacing: 0.18em;
                color: var(--text-muted);
                margin-bottom: 0.6rem;
            }

            .score-breakdown {
                display: flex;
                flex-direction: column;
                gap: 0.55rem;
            }

            .member-score {
                display: grid;
                grid-template-columns: 70px 1fr 30px;
                align-items: center;
                gap: 0.6rem;
            }

            .member-name {
                font-size: 0.78rem;
                color: var(--text-secondary);
                font-weight: 500;
            }

            .member-bar-track {
                height: 3px;
                background: var(--surface);
                border-radius: 3px;
                overflow: hidden;
            }

            .member-bar-fill {
                height: 100%;
                border-radius: 3px;
                background: var(--accent);
                transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            }

            .member-val {
                font-family: "Bebas Neue", sans-serif;
                font-size: 1rem;
                text-align: right;
            }

            .detail-date {
                margin-top: 0.9rem;
                font-size: 0.72rem;
                color: var(--text-muted);
                display: flex;
                align-items: center;
                gap: 0.4rem;
            }

            .detail-date svg {
                width: 14px;
                height: 14px;
                opacity: 0.5;
            }

            /* ─── RANKING TABLE ─── */
            .ranking-section {
                padding: 1.5rem 1.25rem 2.5rem;
            }

            .section-title {
                font-family: "Bebas Neue", sans-serif;
                font-size: 1.4rem;
                letter-spacing: 0.05em;
                margin-bottom: 1rem;
                color: var(--text-primary);
            }

            .member-ranking {
                display: flex;
                flex-direction: column;
                gap: 0.6rem;
            }

            .member-rank-row {
                display: grid;
                grid-template-columns: 24px 1fr auto 50px 20px;
                align-items: center;
                gap: 0.75rem;
                padding: 0.7rem 0.8rem;
                background: var(--bg-card);
                border-radius: var(--radius-sm);
                border: 1px solid var(--border);
                cursor: pointer;
                transition: background 0.2s;
            }

            .member-rank-row:hover {
                background: var(--bg-card-hover);
            }

            .member-rank-chevron {
                font-size: 0.7rem;
                color: var(--text-muted);
                transition: transform 0.3s ease;
                text-align: center;
            }

            .member-rank-row.open .member-rank-chevron {
                transform: rotate(180deg);
            }

            .member-rank-item {
                display: flex;
                flex-direction: column;
            }

            .member-detail-panel {
                max-height: 0;
                overflow: hidden;
                transition:
                    max-height 0.3s ease,
                    border-color 0.2s ease,
                    margin-top 0.2s ease;
                background: var(--bg-card);
                border: 1px solid transparent;
                border-top: none;
                border-radius: 0 0 var(--radius-sm) var(--radius-sm);
                margin-top: 0;
            }

            .member-detail-panel.open {
                max-height: 600px;
                border-color: var(--border);
                margin-top: -0.35rem;
                transition:
                    max-height 1s ease,
                    border-color 0.5s ease,
                    margin-top 0.5s ease;
            }

            .member-detail-inner {
                padding: 0.6rem 0.8rem 0.8rem;
                display: flex;
                flex-direction: column;
                gap: 0.35rem;
            }

            .member-movie-row {
                display: grid;
                grid-template-columns: 1fr auto;
                align-items: center;
                gap: 0.5rem;
                padding: 0.3rem 0.4rem;
                border-radius: 4px;
                font-size: 0.78rem;
            }

            .member-movie-row:nth-child(odd) {
                background: rgba(255, 255, 255, 0.02);
            }

            .member-movie-title {
                color: var(--text-secondary);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .member-movie-score {
                font-family: "Bebas Neue", sans-serif;
                font-size: 0.95rem;
                min-width: 28px;
                text-align: right;
            }

            .member-rank-count {
                font-size: 0.75rem;
                color: var(--text-muted);
                white-space: nowrap;
                text-align: right;
            }

            .member-rank-pos {
                font-family: "Bebas Neue", sans-serif;
                font-size: 1rem;
                color: var(--accent);
                text-align: center;
            }

            .member-rank-name {
                font-size: 0.85rem;
                font-weight: 500;
            }

            .member-rank-avg {
                font-family: "Bebas Neue", sans-serif;
                font-size: 1.15rem;
                text-align: right;
            }

            /* ─── FOOTER ─── */
            .footer {
                text-align: center;
                padding: 2rem 1rem;
                border-top: 1px solid var(--border);
                font-size: 0.68rem;
                color: var(--text-muted);
                letter-spacing: 0.1em;
            }

            .last-updated {
                display: block;
                margin-bottom: 0.6rem;
                font-size: 0.62rem;
                color: var(--text-muted);
                opacity: 0.7;
                letter-spacing: 0.12em;
                text-transform: uppercase;
            }

            /* ─── SCORE COLORS ─── */
            .score-high {
                color: var(--green);
            }
            .score-mid {
                color: var(--accent);
            }
            .score-low {
                color: var(--red);
            }

            .bar-high {
                background: var(--green);
            }
            .bar-mid {
                background: var(--accent);
            }
            .bar-low {
                background: var(--red);
            }

            /* ─── RESPONSIVE ─── */
            @media (min-width: 600px) {
                .movie-grid {
                    grid-template-columns: 1fr 1fr;
                }
                .movie-card {
                    grid-template-columns: 110px 1fr;
                }
                .header h1 {
                    font-size: 3.2rem;
                }
                .stats-bar {
                    gap: 3rem;
                }
            }

            @media (min-width: 960px) {
                .movie-grid {
                    max-width: 960px;
                    margin: 0 auto;
                    border-left: 1px solid var(--border);
                    border-right: 1px solid var(--border);
                }
                .header {
                    padding: 3.5rem 2rem 2.5rem;
                }
                .header h1 {
                    font-size: 3.8rem;
                }
                .controls {
                    justify-content: center;
                    padding: 1.25rem 2rem;
                }
                .stats-bar {
                    max-width: 960px;
                    margin: 0 auto;
                    border-left: 1px solid var(--border);
                    border-right: 1px solid var(--border);
                }
                .controls {
                    max-width: 960px;
                    margin: 0 auto;
                }
                .ranking-section {
                    max-width: 960px;
                    margin: 0 auto;
                    padding: 2rem 1.5rem 3rem;
                }
                .member-ranking {
                    display: grid;
                    grid-template-columns: 1fr 1fr;
                    gap: 0.6rem;
                }
                .member-detail-inner {
                    display: grid;
                    grid-template-columns: 1fr 1fr;
                    gap: 0.2rem 1rem;
                }
                .footer {
                    max-width: 960px;
                    margin: 0 auto;
                }
            }

            @media (min-width: 1200px) {
                .movie-grid {
                    max-width: 1100px;
                }
                .stats-bar,
                .controls,
                .ranking-section,
                .footer {
                    max-width: 1100px;
                }
                .member-ranking {
                    grid-template-columns: 1fr 1fr 1fr;
                }
            }

            /* ─── LOADING SKELETON ─── */
            .poster-skeleton {
                background: linear-gradient(
                    110deg,
                    var(--surface) 30%,
                    #25252d 50%,
                    var(--surface) 70%
                );
                background-size: 200% 100%;
                animation: shimmer 1.5s infinite;
            }
            @keyframes shimmer {
                to {
                    background-position: -200% 0;
                }
            }
        </style>
    </head>
    <body>
        <header class="header">
            <div class="header-logo">
                <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <rect
                        x="2"
                        y="2"
                        width="20"
                        height="20"
                        rx="2.18"
                        ry="2.18"
                    />
                    <line x1="7" y1="2" x2="7" y2="22" />
                    <line x1="17" y1="2" x2="17" y2="22" />
                    <line x1="2" y1="12" x2="22" y2="12" />
                    <line x1="2" y1="7" x2="7" y2="7" />
                    <line x1="2" y1="17" x2="7" y2="17" />
                    <line x1="17" y1="17" x2="22" y2="17" />
                    <line x1="17" y1="7" x2="22" y2="7" />
                </svg>
                <h1>Cinema <span>Chorizox</span></h1>
            </div>
            <!--<p class="header-subtitle">
                Club de cine · Puntuaciones colectivas
            </p>-->
        </header>

        <div class="stats-bar" id="statsBar"></div>

        <nav class="controls" id="controls"></nav>

        <main class="movie-grid" id="movieGrid"></main>

        <section class="ranking-section" id="rankingSection"></section>

        <footer class="footer">
            <span id="lastUpdated"></span>
            Creado con la ayuda de Claude y auto-hospedado.<br />
            Cinema Chorizox © 2026 — Hecho con 🍿, buen cine y un poco de 🤖 IA.
        </footer>

        <script>
            /* ════════════════════════════════════════════
   CONFIGURATION — loaded from movies-config.json
   ════════════════════════════════════════════ */
            let CONFIG = {};

            /* ════════════ UTILITY FUNCTIONS ════════════ */

            function avg(scores) {
                const vals = Object.values(scores);
                return vals.reduce((a, b) => a + b, 0) / vals.length;
            }

            function scoreClass(val) {
                if (val >= 8) return "high";
                if (val >= 6) return "mid";
                return "low";
            }

            function formatDate(iso) {
                const d = new Date(iso + "T00:00:00");
                return d.toLocaleDateString("es-ES", {
                    day: "numeric",
                    month: "short",
                    year: "numeric",
                });
            }

            /* ════════════ RENDER STATS BAR ════════════ */

            function renderStats(movies) {
                const bar = document.getElementById("statsBar");
                const totalMovies = movies.length;
                const allAvgs = movies.map((m) => avg(m.scores));
                const globalAvg = (
                    allAvgs.reduce((a, b) => a + b, 0) / allAvgs.length
                ).toFixed(1);
                const best = movies.reduce((a, b) =>
                    avg(a.scores) > avg(b.scores) ? a : b,
                );

                bar.innerHTML = `
    <div class="stat">
      <div class="stat-value">${totalMovies}</div>
      <div class="stat-label">Películas</div>
    </div>
    <div class="stat">
      <div class="stat-value">${globalAvg}</div>
      <div class="stat-label">Media global</div>
    </div>
    <div class="stat">
      <div class="stat-value">${CONFIG.members.length}</div>
      <div class="stat-label">Miembros</div>
    </div>
  `;
            }

            /* ════════════ RENDER CONTROLS ════════════ */

            let currentSort = "recent";

            function renderControls() {
                const controls = document.getElementById("controls");
                const sorts = [
                    { id: "recent", label: "Recientes" },
                    { id: "best", label: "Mejor puntuadas" },
                    { id: "worst", label: "Peor puntuadas" },
                    { id: "alpha", label: "A → Z" },
                ];

                controls.innerHTML = sorts
                    .map(
                        (s) =>
                            `<button class="control-btn ${s.id === currentSort ? "active" : ""}" data-sort="${s.id}">${s.label}</button>`,
                    )
                    .join("");

                controls.querySelectorAll(".control-btn").forEach((btn) => {
                    btn.addEventListener("click", () => {
                        currentSort = btn.dataset.sort;
                        renderControls();
                        renderMovies(sortMovies(CONFIG.movies));
                    });
                });
            }

            function sortMovies(movies) {
                const sorted = [...movies];
                switch (currentSort) {
                    case "recent":
                        return sorted.sort(
                            (a, b) =>
                                new Date(b.date_watched) -
                                new Date(a.date_watched),
                        );
                    case "best":
                        return sorted.sort(
                            (a, b) => avg(b.scores) - avg(a.scores),
                        );
                    case "worst":
                        return sorted.sort(
                            (a, b) => avg(a.scores) - avg(b.scores),
                        );
                    case "alpha":
                        return sorted.sort((a, b) =>
                            a.title.localeCompare(b.title, "es"),
                        );
                    default:
                        return sorted;
                }
            }

            /* ════════════ RENDER MOVIES ════════════ */

            function renderMovies(movies) {
                const grid = document.getElementById("movieGrid");
                const ranked = [...movies].sort(
                    (a, b) => avg(b.scores) - avg(a.scores),
                );

                grid.innerHTML = movies
                    .map((movie, i) => {
                        const average = avg(movie.scores);
                        const sc = scoreClass(average);
                        const rank =
                            ranked.findIndex((m) => m.title === movie.title) +
                            1;
                        const voterCount = Object.keys(movie.scores).length;

                        const membersHTML = Object.entries(movie.scores)
                            .sort((a, b) => b[1] - a[1])
                            .map(
                                ([name, val]) => `
        <div class="member-score">
          <span class="member-name">${name}</span>
          <div class="member-bar-track">
            <div class="member-bar-fill" style="width: ${val * 10}%; background: var(--${scoreClass(val) === "high" ? "green" : scoreClass(val) === "mid" ? "accent" : "red"})"></div>
          </div>
          <span class="member-val score-${scoreClass(val)}">${val}</span>
        </div>
      `,
                            )
                            .join("");

                        return `
      <article class="movie-card" data-idx="${i}" style="animation-delay: ${i * 0.06}s">
        <div class="movie-poster">
          <img src="${movie.poster}" alt="${movie.title}" loading="lazy"
               onerror="this.parentElement.classList.add('poster-skeleton'); this.style.display='none';">
          <div class="rank-badge">#${rank}</div>
        </div>
        <div class="movie-info">
          <div class="movie-title" title="${movie.title}">${movie.title}</div>
          <div class="movie-meta">
            <span>${movie.year}</span>
            <span class="dot"></span>
            <span>${movie.director}</span>
          </div>
          <div class="movie-genres">
            ${movie.genres.map((g) => `<span class="genre-tag">${g}</span>`).join("")}
          </div>
          <div class="movie-score-row">
            <span class="avg-score score-${sc}">${average.toFixed(1)}</span>
            <div class="score-bar-track">
              <div class="score-bar-fill bar-${sc}" style="width: ${average * 10}%"></div>
            </div>
            <span class="score-voters">${voterCount} votos</span>
          </div>
        </div>
      </article>
      <div class="movie-detail" data-detail="${i}">
        <div class="detail-inner">
          <div class="detail-section-label">Desglose de puntuaciones</div>
          <div class="score-breakdown">${membersHTML}</div>
          <div class="detail-date">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Vista el ${formatDate(movie.date_watched)}
          </div>
        </div>
      </div>
    `;
                    })
                    .join("");

                // Toggle expand
                function closeDetail(d) {
                    if (d.classList.contains("open")) {
                        d.classList.remove("open");
                        d.classList.add("closing");
                        d.addEventListener(
                            "animationend",
                            () => {
                                d.classList.remove("closing");
                            },
                            { once: true },
                        );
                    }
                }

                grid.querySelectorAll(".movie-card").forEach((card) => {
                    card.addEventListener("click", () => {
                        const wasExpanded = card.classList.contains("expanded");
                        grid.querySelectorAll(".movie-card").forEach((c) =>
                            c.classList.remove("expanded"),
                        );
                        grid.querySelectorAll(".movie-detail").forEach((d) =>
                            closeDetail(d),
                        );
                        if (!wasExpanded) {
                            card.classList.add("expanded");
                            const detail = card.nextElementSibling;
                            if (
                                detail &&
                                detail.classList.contains("movie-detail")
                            ) {
                                detail.classList.add("open");
                            }
                        }
                    });
                });
            }

            /* ════════════ RENDER MEMBER RANKING ════════════ */

            function renderRanking() {
                const section = document.getElementById("rankingSection");
                const memberAvgs = CONFIG.members
                    .map((name) => {
                        const scores = CONFIG.movies
                            .map((m) => m.scores[name])
                            .filter(Boolean);
                        const memberAvg =
                            scores.reduce((a, b) => a + b, 0) / scores.length;
                        return { name, avg: memberAvg, count: scores.length };
                    })
                    .sort((a, b) => {
                        if (isNaN(a.avg) && isNaN(b.avg)) return 0;
                        if (isNaN(a.avg)) return 1;
                        if (isNaN(b.avg)) return -1;
                        return b.avg - a.avg;
                    });

                section.innerHTML = `
    <h2 class="section-title">Ranking de miembros</h2>
    <div class="member-ranking">
      ${memberAvgs
          .map((m, i) => {
              const movieScores = CONFIG.movies
                  .filter((mv) => mv.scores[m.name] != null)
                  .map((mv) => ({ title: mv.title, score: mv.scores[m.name] }))
                  .sort((a, b) => b.score - a.score);
              const moviesHTML = movieScores
                  .map(
                      (ms) => `
                      <div class="member-movie-row">
                        <span class="member-movie-title">${ms.title}</span>
                        <span class="member-movie-score score-${scoreClass(ms.score)}">${ms.score.toFixed(1)}</span>
                      </div>`,
                  )
                  .join("");
              return `
        <div class="member-rank-item">
          <div class="member-rank-row" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
            <span class="member-rank-pos">${i + 1}</span>
            <span class="member-rank-name">${m.name}</span>
            <span class="member-rank-count">${m.count} ${m.count === 1 ? "peli" : "pelis"}</span>
            <span class="member-rank-avg${m.count === 0 ? "" : ` score-${scoreClass(m.avg)}`}">${m.count === 0 ? "Sin votos" : m.avg.toFixed(1)}</span>
            <span class="member-rank-chevron">▼</span>
          </div>
          <div class="member-detail-panel">
            <div class="member-detail-inner">
              ${moviesHTML || '<span style="color:var(--text-muted);font-size:0.78rem">Sin votos aún</span>'}
            </div>
          </div>
        </div>`;
          })
          .join("")}
    </div>
  `;
            }

            /* ════════════ INIT ════════════ */

            fetch("movies-config.json")
                .then((res) => {
                    const lastMod = res.headers.get("Last-Modified");
                    return res.json().then((data) => ({ data, lastMod }));
                })
                .then(({ data, lastMod }) => {
                    CONFIG = data;
                    renderStats(CONFIG.movies);
                    renderControls();
                    renderMovies(sortMovies(CONFIG.movies));
                    renderRanking();

                    if (lastMod) {
                        const d = new Date(lastMod);
                        const formatted = d.toLocaleDateString("es-ES", {
                            day: "numeric",
                            month: "long",
                            year: "numeric",
                        }) + " · " + d.toLocaleTimeString("es-ES", {
                            hour: "2-digit",
                            minute: "2-digit",
                        });
                        document.getElementById("lastUpdated").className = "last-updated";
                        document.getElementById("lastUpdated").textContent =
                            "Puntuaciones actualizadas: " + formatted;
                    }
                })
                .catch((err) =>
                    console.error("Error loading movies-config.json:", err),
                );
        </script>
    </body>
</html>

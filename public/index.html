<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Cinema Chorizox</title>
        <link rel="icon" type="image/svg+xml" href="favicon.svg" />

        <!-- Open Graph / Facebook -->
        <meta property="og:type" content="website" />
        <meta property="og:title" content="Cinema Chorizox" />
        <meta property="og:description" content="Cinema Chorizox" />
        <meta
            property="og:image"
            content="https://cinema.dgv93.eu/preview.jpg"
        />

        <!-- Twitter -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Cinema Chorizox" />
        <meta name="twitter:description" content="Cinema Chorizox" />
        <meta
            name="twitter:image"
            content="https://cinema.dgv93.eu/preview.jpg"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <header class="header">
            <div class="header-logo">
                <img src="favicon.svg" alt="Cinema Chorizox logo" />
                <h1>Cinema <span>Chorizox</span></h1>
            </div>
            <!--<p class="header-subtitle">
                Club de cine · Puntuaciones colectivas
            </p>-->
        </header>

        <div class="stats-bar" id="statsBar"></div>

        <nav class="controls" id="controls"></nav>

        <main class="movie-grid" id="movieGrid"></main>

        <section class="ranking-section" id="rankingSection"></section>

        <footer class="footer">
            <span id="lastUpdated"></span>
            Creado con la ayuda de Claude y auto-hospedado.<br />
            Cinema Chorizox © 2026 — Hecho con 🍿, buen cine y un poco de 🤖 IA.
        </footer>

        <!-- Poster Modal -->
        <div class="poster-modal" id="posterModal">
            <div class="poster-modal-backdrop"></div>
            <div class="poster-modal-content">
                <button class="poster-modal-close" aria-label="Cerrar">&times;</button>
                <img id="posterModalImg" src="" alt="" />
            </div>
        </div>

        <script src="app.js"></script>
    </body>
</html>
